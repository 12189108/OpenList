name: Custom Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '请输入发布版本号 (例如: v1.0.0)'
        required: true
        type: string
        default: 'v1.0.0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Install xgo
        # xgo 用于交叉编译 Windows amd64
        run: go install src.techknowlogick.com/xgo@latest

      - name: Build All Targets
        # 运行我们在 build.sh 中新增的 custom_release 分支
        run: bash build.sh release custom_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ github.event.inputs.version }}
          FRONTEND_REPO: "12189108/OpenList-Frontend"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openlist-binaries
          path: build/*

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: build/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
