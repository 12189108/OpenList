name: Custom Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '请输入发布版本号 (例如: v1.0.0)'
        required: true
        type: string
        default: 'v1.0.0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        target:
          # 精确控制你需要的 4 个平台
          - windows-amd64
          - windows-arm64
          - linux-amd64-musl
          - linux-arm64-musl
    name: Build ${{ matrix.target }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - uses: benjlevesque/short-sha@v3.0
        id: short-sha

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Setup web
        # 获取你的专属前端仓库
        run: bash build.sh release web
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FRONTEND_REPO: "12189108/OpenList-Frontend"

      - name: Build
        uses: OpenListTeam/cgo-actions@v1.2.2
        with:
          targets: ${{ matrix.target }}
          musl-target-format: $os-$musl-$arch
          # 【核心修复1】开启纯静态链接，彻底解决 cannot execute 的报错！
          static-link-for-musl: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          out-dir: build
          # -trimpath 可以去掉文件路径信息，略微优化
          flags: -trimpath -tags=jsoniter
          x-flags: |
            github.com/OpenListTeam/OpenList/v4/internal/conf.BuiltAt=$built_at
            github.com/OpenListTeam/OpenList/v4/internal/conf.GitAuthor=The OpenList Projects Contributors <noreply@openlist.team>
            github.com/OpenListTeam/OpenList/v4/internal/conf.GitCommit=$git_commit
            github.com/OpenListTeam/OpenList/v4/internal/conf.Version=${{ github.event.inputs.version }}
            github.com/OpenListTeam/OpenList/v4/internal/conf.WebVersion=rolling
          output: openlist-${{ matrix.target }}$ext

      - name: Strip Debug Info (Remove Symbols)
        # 【核心修复2】编译完后通过底层命令剔除所有调试信息，效果等同于 -s -w，体积瞬间变小！
        run: |
          sudo apt-get update && sudo apt-get install -y binutils binutils-mingw-w64 upx-ucl
          
          # 1. 剥离 Linux 程序的调试信息
          strip build/openlist-linux-* || true
          
          # 2. 剥离 Windows amd64 程序的调试信息
          x86_64-w64-mingw32-strip build/openlist-windows-amd64* || true
          
          # 3. 最后使用 UPX 进行终极压缩 (遇到不支持的架构会自动跳过不报错)
          upx -9 build/* || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openlist_${{ matrix.target }}
          path: build/*

  release:
    needs: build
    name: Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: build-assets
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: build-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
