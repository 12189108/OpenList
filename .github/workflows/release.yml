name: Custom Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: '请输入发布版本号 (例如: v1.0.0)'
        required: true
        type: string
        default: 'v1.0.0'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Setup web
        # 拉取你指定的自有前端仓库
        run: bash build.sh release web
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FRONTEND_REPO: "12189108/OpenList-Frontend"

      - name: Install Toolchains
        # 安装标准的 Linux ARM64 和 Windows 交叉编译器 (不用 Snap，极速且不报错)
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu gcc-mingw-w64-x86-64 g++-mingw-w64-x86-64
          
          # 下载 Zig 用于 Windows ARM64
          wget -q https://ziglang.org/download/0.11.0/zig-linux-x86_64-0.11.0.tar.xz
          tar -xf zig-linux-x86_64-0.11.0.tar.xz

      - name: Build Binaries
        run: |
          # 准备环境变量
          export PATH="$PWD/zig-linux-x86_64-0.11.0:$PATH"
          export CGO_ENABLED=1
          
          mkdir -p build
          VERSION="${{ github.event.inputs.version }}"
          BUILT_AT="$(date +'%F %T %z')"
          GIT_AUTHOR="The OpenList Projects Contributors <noreply@openlist.team>"
          GIT_COMMIT=$(git log --pretty=format:"%h" -1 || echo "unknown")
          
          echo "==== 1. 编译 Linux AMD64 (标准版，你的服务器能直接跑) ===="
          GOOS=linux GOARCH=amd64 CC=gcc CXX=g++ \
          go build -o build/openlist-linux-amd64 \
          -ldflags="-s -w -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.BuiltAt=$BUILT_AT' -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.GitAuthor=$GIT_AUTHOR' -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.GitCommit=$GIT_COMMIT' -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.Version=$VERSION' -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.WebVersion=rolling'" \
          -tags=jsoniter .
          
          echo "==== 2. 编译 Linux ARM64 (标准版) ===="
          GOOS=linux GOARCH=arm64 CC=aarch64-linux-gnu-gcc CXX=aarch64-linux-gnu-g++ \
          go build -o build/openlist-linux-arm64 \
          -ldflags="-s -w -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.BuiltAt=$BUILT_AT' -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.GitAuthor=$GIT_AUTHOR' -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.GitCommit=$GIT_COMMIT' -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.Version=$VERSION' -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.WebVersion=rolling'" \
          -tags=jsoniter .

          echo "==== 3. 编译 Windows AMD64 ===="
          GOOS=windows GOARCH=amd64 CC=x86_64-w64-mingw32-gcc CXX=x86_64-w64-mingw32-g++ \
          go build -o build/openlist-windows-amd64.exe \
          -ldflags="-s -w -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.BuiltAt=$BUILT_AT' -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.GitAuthor=$GIT_AUTHOR' -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.GitCommit=$GIT_COMMIT' -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.Version=$VERSION' -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.WebVersion=rolling'" \
          -tags=jsoniter .

          echo "==== 4. 编译 Windows ARM64 ===="
          chmod +x ./wrapper/zcc-arm64 ./wrapper/zcxx-arm64
          GOOS=windows GOARCH=arm64 CC=$PWD/wrapper/zcc-arm64 CXX=$PWD/wrapper/zcxx-arm64 \
          go build -o build/openlist-windows-arm64.exe \
          -ldflags="-s -w -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.BuiltAt=$BUILT_AT' -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.GitAuthor=$GIT_AUTHOR' -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.GitCommit=$GIT_COMMIT' -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.Version=$VERSION' -X 'github.com/OpenListTeam/OpenList/v4/internal/conf.WebVersion=rolling'" \
          -tags=jsoniter .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: openlist-binaries
          path: build/*

  release:
    needs: build
    name: Publish Release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: build-assets
          merge-multiple: true

      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          files: build-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
